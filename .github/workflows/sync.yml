name: sync

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Kolik filmů nahrát v jednom běhu (default 5)"
        required: false
        default: "5"
  # schedule:
  #   - cron: "0 */6 * * *"  # enable once we trust the workflow

jobs:
  upload-batch:
    name: Upload N missing films
    runs-on: ubuntu-latest
    timeout-minutes: 350  # GH max je 360 min — necháme rezervu na commit
    permissions:
      contents: write  # commit state + log back to repo
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Init log entry
        run: |
          mkdir -p state
          touch state/sync.log
          RUN_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo ""
            echo "===== run $RUN_TS batch_size=${{ inputs.batch_size }} ($RUN_URL) ====="
          } >> state/sync.log

      - name: Run sync batch
        env:
          PREHRAJTO_EMAIL: ${{ secrets.PREHRAJTO_EMAIL }}
          PREHRAJTO_PASSWORD: ${{ secrets.PREHRAJTO_PASSWORD }}
        run: |
          python src/sync_batch.py --count "${{ inputs.batch_size }}"

      - name: Commit state + log
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/uploaded.json state/sync.log
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            UP_COUNT=$(python -c "import json; print(len(json.load(open('state/uploaded.json'))['uploads']))")
            git commit -m "chore(sync): batch run — total uploads now ${UP_COUNT}"
            # Pull --rebase v případě, že mezitím přišel jiný commit (závod s jiným runem)
            git pull --rebase origin main || true
            git push
          fi
