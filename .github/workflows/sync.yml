name: sync

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Kolik filmů nahrát v jednom běhu (default 20)"
        required: false
        default: "20"
      auto_continue:
        description: "Po úspěšné dávce automaticky spustit další"
        required: false
        default: "true"

concurrency:
  group: sync-main
  cancel-in-progress: false

jobs:
  upload-batch:
    name: Upload N missing films
    runs-on: ubuntu-latest
    timeout-minutes: 350  # GH max je 360 min — necháme rezervu na commit
    permissions:
      contents: write  # commit state + log back to repo
      actions: write   # dispatch next overnight batch
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Init log entry
        run: |
          mkdir -p state
          touch state/sync.log
          RUN_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo ""
            echo "===== run $RUN_TS batch_size=${{ inputs.batch_size || '20' }} ($RUN_URL) ====="
          } >> state/sync.log

      - name: Run sync batch
        env:
          PREHRAJTO_EMAIL: ${{ secrets.PREHRAJTO_EMAIL }}
          PREHRAJTO_PASSWORD: ${{ secrets.PREHRAJTO_PASSWORD }}
          PREHRAJTO_COOKIE_JSON: ${{ secrets.PREHRAJTO_COOKIE_JSON }}
          # Current enriched backlog already encodes CZ/SK suitability.
          # Many rows do not have detected_language, so the legacy runtime
          # audio filter would skip them all.
          REQUIRE_CS_AUDIO: "false"
        run: |
          python src/sync_batch.py --count "${{ inputs.batch_size || '20' }}"

      - name: Commit state + log
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/uploaded.json state/sync.log
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            UP_COUNT=$(python -c "import json; print(len(json.load(open('state/uploaded.json'))['uploads']))")
            git commit -m "chore(sync): batch run — total uploads now ${UP_COUNT}"
            # Pull --rebase v případě, že mezitím přišel jiný commit (závod s jiným runem)
            git pull --rebase origin main || true
            git push
          fi

      - name: Continue overnight
        if: success() && (github.event_name == 'schedule' || inputs.auto_continue != 'false')
        env:
          GH_TOKEN: ${{ github.token }}
          BATCH_SIZE: ${{ inputs.batch_size || '20' }}
        run: |
          set -e
          last=$(grep 'step=batch-end' state/sync.log | tail -1 || true)
          echo "last batch: $last"
          succeeded=$(printf '%s' "$last" | sed -n 's/.*succeeded=\([0-9][0-9]*\).*/\1/p')
          remaining=$(printf '%s' "$last" | sed -n 's/.*backlog_remaining=\([-0-9][0-9]*\).*/\1/p')
          succeeded=${succeeded:-0}
          remaining=${remaining:-0}
          if [ "$succeeded" -gt 0 ] && [ "$remaining" -gt 0 ]; then
            echo "Dispatching next batch_size=$BATCH_SIZE; remaining=$remaining"
            gh workflow run sync.yml -f batch_size="$BATCH_SIZE" -f auto_continue=true
          else
            echo "Not dispatching next batch; succeeded=$succeeded remaining=$remaining"
          fi
