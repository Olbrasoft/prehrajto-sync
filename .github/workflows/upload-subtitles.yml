name: upload-subtitles

on:
  workflow_dispatch:
    inputs:
      only_ids:
        description: "Comma-separated cr_film_id list (blank = all films with sktorrent_subtitles)"
        required: false
        default: ""
      exclude_ids:
        description: "Comma-separated cr_film_id list to skip"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no actual uploads)"
        required: false
        default: "false"

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests
      - name: Upload subtitles
        env:
          PREHRAJTO_EMAIL: ${{ secrets.PREHRAJTO_EMAIL }}
          PREHRAJTO_PASSWORD: ${{ secrets.PREHRAJTO_PASSWORD }}
        run: |
          ARGS=()
          if [ -n "${{ inputs.only_ids }}" ]; then
            ARGS+=(--only-ids "${{ inputs.only_ids }}")
          fi
          if [ -n "${{ inputs.exclude_ids }}" ]; then
            ARGS+=(--exclude-ids "${{ inputs.exclude_ids }}")
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python src/upload_subtitles.py "${ARGS[@]}"
